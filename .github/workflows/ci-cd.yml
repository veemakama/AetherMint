name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/*, fix/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd backend
        npm ci
    
    - name: Run type checking
      run: |
        cd backend
        npm run typecheck
    
    - name: Run linting
      run: |
        cd backend
        npm run lint
    
    - name: Run tests
      run: |
        cd backend
        npm run test:ci
    
    - name: Generate coverage report
      run: |
        cd backend
        npm run test:coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage/lcov.info
        flags: backend
        name: backend-coverage

  test-federated-learning:
    runs-on: ubuntu-latest
    needs: test-backend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd backend
        npm ci
    
    - name: Run federated learning tests
      run: |
        cd backend
        npm test -- --testPathPattern=federatedLearning
    
    - name: Test federated learning API endpoints
      run: |
        cd backend
        npm run test:api -- --testPathPattern=federatedLearning
    
    - name: Validate federated learning dependencies
      run: |
        cd backend
        node -e "
        const deps = ['@tensorflow/tfjs', 'paillier-js', 'crypto-js', 'uuid'];
        deps.forEach(dep => {
          try {
            require.resolve(dep);
            console.log('✓ ' + dep + ' is available');
          } catch(e) {
            console.error('✗ ' + dep + ' is missing');
            process.exit(1);
          }
        });
        "

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run npm audit
      run: |
        cd backend
        npm audit --audit-level=moderate
    
    - name: Run security scan
      uses: securecodewarrior/github-action-add-sarif@v1
      with:
        sarif-file: 'security-scan-results.sarif'

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-federated-learning, test-swarm-learning, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd backend
        npm ci
    
    - name: Build application
      run: |
        cd backend
        npm run build
    
    - name: Run integration tests
      run: |
        cd backend
        npm run test:integration
    
    - name: Deploy to staging
      if: success()
      run: |
        echo "Deploying to staging environment..."
        # Add deployment commands here
    
    - name: Run smoke tests
      if: success()
      run: |
        echo "Running smoke tests..."
        # Add smoke test commands here
    
    - name: Deploy to production
      if: success() && github.ref == 'refs/heads/main'
      run: |
        echo "Deploying to production environment..."
        # Add production deployment commands here

  federated-learning-performance:
    runs-on: ubuntu-latest
    needs: test-federated-learning
    if: contains(github.event.head_commit.message, '[perf-test]')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd backend
        npm ci
    
    - name: Run performance tests
      run: |
        cd backend
        npm run test:performance -- --testPathPattern=federatedLearning
    
    - name: Benchmark federated learning
      run: |
        cd backend
        node -e "
        const { FederatedLearningCoordinator } = require('./src/services/federatedLearning/FederatedLearningCoordinator');
        const coordinator = new FederatedLearningCoordinator();
        
        console.log('Running federated learning benchmark...');
        const startTime = Date.now();
        
        // Simulate federated learning session
        coordinator.initializeSession({ layers: [10, 5, 1] }).then(() => {
          const endTime = Date.now();
          console.log('Benchmark completed in ' + (endTime - startTime) + 'ms');
        }).catch(console.error);
        "

  test-swarm-learning:
    runs-on: ubuntu-latest
    needs: test-backend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd backend
        npm ci
    
    - name: Run swarm learning tests
      run: |
        cd backend
        npm test -- --testPathPattern=swarmLearning
    
    - name: Test swarm learning API endpoints
      run: |
        cd backend
        npm run test:api -- --testPathPattern=swarmLearning
    
    - name: Validate swarm learning dependencies
      run: |
        cd backend
        node -e "
        const deps = ['winston', 'crypto', 'uuid'];
        deps.forEach(dep => {
          try {
            require.resolve(dep);
            console.log('✓ ' + dep + ' is available');
          } catch(e) {
            console.error('✗ ' + dep + ' is missing');
            process.exit(1);
          }
        });
        "

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    if: always()
    
    steps:
    - name: Notify on success
      if: needs.build-and-deploy.result == 'success'
      run: |
        echo "✅ Pipeline completed successfully!"
    
    - name: Notify on failure
      if: needs.build-and-deploy.result == 'failure'
      run: |
        echo "❌ Pipeline failed!"
        exit 1
